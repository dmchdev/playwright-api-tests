version: 2.1

jobs:
  build-and-test:
    machine:
      image: ubuntu-2204:current # Native Docker & Compose support
    steps:
      - checkout

      # 1. Build both Docker images dynamically from source code
      # This looks at the 'build:' contexts defined in docker-compose.yml
      - run:
          name: Build Application Images
          command: docker-compose build

      # 2. Spin up the Flask back-end in the background
      - run:
          name: Start Flask Backend
          command: docker-compose up -d backend

      # 3. Wait for Flask to be fully ready before firing Playwright
      # This prevents Playwright from failing due to connection timeouts
      - run:
          name: Wait for Flask API
          command: |
            echo "Waiting 1 s..."
            sleep 1
            echo "Flask is up!"

      # 4. Run the Playwright tests
      # --abort-on-container-exit ensures CircleCI gets the proper exit code from your tests
      - run:
          name: Execute Playwright Tests
          command: docker-compose up --abort-on-container-exit tests

      # 5. Clean up containers (Optional but good practice)
      - run:
          name: Cleanup Containers
          command: docker-compose down
          when: always

workflows:
  e2e-pipeline:
    jobs:
      - build-and-test
