version: '3.8'

services:
  # The Flask Back-end Service
  backend:
    build:
      context: ./backend # Path to your Flask source and Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development

  # The Playwright Test Runner Service
  tests:
    build:
      context: ./tests # Path to your JS/Playwright source and Dockerfile
    container_name: tests
    environment:
      # Tell Playwright to look for the backend using the service name container link
      - BASE_URL=http://backend:5000 
    depends_on:
      - backend
